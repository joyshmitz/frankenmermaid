ck-label">2026-01-02</text></g><g class="fm-axis-tick"><line x1="168" y1="69" x2="168" y2="81" stroke="var(--fm-edge-color, #94a3b8)" stroke-width="1"/><text x="171" y="65" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.80" fill="var(--fm-text-color, #64748b)" class="fm-axis-tick-label">2026-01-03</text></g><g class="fm-axis-tick"><line x1="216" y1="69" x2="216" y2="81" stroke="var(--fm-edge-color, #94a3b8)" stroke-width="1"/><text x="219" y="65" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.80" fill="var(--fm-text-color, #64748b)" class="fm-axis-tick-label">2026-01-04</text></g><g class="fm-axis-tick"><line x1="264" y1="69" x2="264" y2="81" stroke="var(--fm-edge-color, #94a3b8)" stroke-width="1"/><text x="267" y="65" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.80" fill="var(--fm-text-color, #64748b)" class="fm-axis-tick-label">2026-01-05</text></g><g class="fm-axis-tick"><line x1="312" y1="69" x2="312" y2="81" stroke="var(--fm-edge-color, #94a3b8)" stroke-width="1"/><text x="315" y="65" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.80" fill="var(--fm-text-color, #64748b)" class="fm-axis-tick-label">2026-01-06</text></g><g class="fm-axis-tick"><line x1="360" y1="69" x2="360" y2="81" stroke="var(--fm-edge-color, #94a3b8)" stroke-width="1"/><text x="363" y="65" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.80" fill="var(--fm-text-color, #64748b)" class="fm-axis-tick-label">2026-01-07</text></g><g class="fm-edge" data-fm-edge-id="0" role="graphics-symbol" tabindex="0"><path d="M248 162.25 C244.25 162.25,236.75 141.85,233 162.25 C229.25 182.65,236.75 223.45,233 243.85 C229.25 264.25,221.75 243.85,218 243.85" fill="none" stroke="#94a3b8" stroke-width="1.80" class="fm-edge fm-edge-solid" data-fm-edge-id="0" marker-end="url(#arrow-end)"/><title>Design points to Build</title></g><g class="fm-node fm-node-accent-8 fm-node-shape-rect" data-id="Design_5" data-fm-node-id="Design_5" role="graphics-symbol" aria-label="Design" tabindex="0"><rect x="92" y="129" width="156" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="170" y="166.85" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="13.80" fill="#1a1a2e">Design</text><title>Node: Design, rectangle</title></g><g class="fm-node fm-node-accent-7 fm-node-shape-rect" data-id="Build_6" data-fm-node-id="Build_6" role="graphics-symbol" aria-label="Build" tabindex="0"><rect x="218" y="210.60" width="192" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="314" y="248.45" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="13.80" fill="#1a1a2e">Build</text><title>Node: Build, rectangle</title></g></svg>
