<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 731.3778 534.25854" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" data-nodes="3" data-edges="0" data-type="pie" data-detail-tier="rich"><title>pie diagram</title><desc>A pie chart with 3 nodes and 0 edges, flowing top to bottom</desc><style>:root {
  --fm-bg: #fafbfc;
  --fm-text-color: #1a1a2e;
  --fm-node-fill: #ffffff;
  --fm-node-stroke: #e2e8f0;
  --fm-edge-color: #94a3b8;
  --fm-cluster-fill: rgba(241,245,249,0.6);
  --fm-cluster-stroke: #cbd5e1;
  --fm-accent-1: #6366f1;
  --fm-accent-2: #3b82f6;
  --fm-accent-3: #06b6d4;
  --fm-accent-4: #8b5cf6;
  --fm-accent-5: #f59e0b;
  --fm-accent-6: #ec4899;
  --fm-accent-7: #10b981;
  --fm-accent-8: #f43f5e;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
.fm-text {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 15px;
  font-weight: 500;
}

:root {
  --fm-edge-muted: var(--fm-cluster-stroke);
  --fm-edge-label-bg: var(--fm-bg);
  --fm-edge-label-border: var(--fm-cluster-stroke);
  --fm-edge-label-text: var(--fm-text-color);
  --fm-cluster-label-color: var(--fm-text-color);
  --fm-cluster-c4-fill: var(--fm-cluster-fill);
  --fm-cluster-c4-stroke: var(--fm-cluster-stroke);
  --fm-cluster-swimlane-fill: var(--fm-cluster-fill);
  --fm-cluster-swimlane-stroke: var(--fm-cluster-stroke);
  --fm-surface-shadow: rgba(15, 23, 42, 0.1);
}
svg {
  shape-rendering: geometricPrecision;
  background: var(--fm-bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, color-mix(in srgb, var(--fm-accent-1) 4%, transparent) 0%, transparent 50%),
    linear-gradient(180deg, var(--fm-bg) 0%, color-mix(in srgb, var(--fm-bg) 96%, var(--fm-node-stroke) 4%) 100%);
}
.fm-node {
  isolation: isolate;
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-hover-accent: var(--fm-edge-color);
}
.fm-node rect,
.fm-node path,
.fm-node circle,
.fm-node ellipse,
.fm-node polygon {
  fill: var(--fm-node-fill);
  stroke: var(--fm-node-accent);
  stroke-width: 1.6;
  vector-effect: non-scaling-stroke;
  shape-rendering: geometricPrecision;
  filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.10)) drop-shadow(0 1px 3px rgba(0, 0, 0, 0.06));
  transition: fill 200ms ease, stroke 200ms ease, filter 200ms ease, transform 200ms cubic-bezier(0.4, 0, 0.2, 1);
}
.fm-node line {
  stroke: var(--fm-node-accent);
  stroke-width: 1.5;
  vector-effect: non-scaling-stroke;
}
.fm-node text {
  fill: var(--fm-text-color);
  font-weight: 600;
  letter-spacing: -0.02em;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
}
.fm-node:hover rect,
.fm-node:hover path,
.fm-node:hover circle,
.fm-node:hover ellipse,
.fm-node:hover polygon {
  stroke: var(--fm-node-hover-accent);
  filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.14)) drop-shadow(0 3px 8px rgba(0, 0, 0, 0.08));
  transform: translateY(-2px) scale(1.01);
  transform-origin: center;
}
.fm-node-accent-1 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-1) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-1);
}
.fm-node-accent-2 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-2) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-2);
}
.fm-node-accent-3 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-3) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-3);
}
.fm-node-accent-4 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-4) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-4);
}
.fm-node-accent-5 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-5) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-5);
}
.fm-node-accent-6 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-6) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-6);
}
.fm-node-accent-7 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-7) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-7);
}
.fm-node-accent-8 {
  --fm-node-accent: var(--fm-node-stroke);
  --fm-node-accent: color-mix(in srgb, var(--fm-accent-8) 50%, var(--fm-node-stroke));
  --fm-node-hover-accent: var(--fm-accent-8);
}
.fm-node.fm-node-shape-note path,
.fm-node.fm-node-shape-note rect {
  fill: var(--fm-node-fill);
  fill: color-mix(in srgb, #fef3c7 40%, var(--fm-node-fill));
}
.fm-node.fm-node-shape-cloud path {
  fill: var(--fm-node-fill);
  fill: color-mix(in srgb, var(--fm-accent-2) 15%, var(--fm-node-fill));
}
.fm-node.fm-node-shape-cylinder path {
  fill: var(--fm-node-fill);
  fill: color-mix(in srgb, var(--fm-accent-1) 12%, var(--fm-node-fill));
}
.fm-node.fm-node-shape-star path,
.fm-node.fm-node-shape-pentagon path {
  stroke-width: 1.8;
}
.fm-edge {
  fill: none;
  stroke: var(--fm-edge-color);
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
  paint-order: stroke;
  transition: stroke 200ms ease, opacity 200ms ease, stroke-width 200ms ease;
  cursor: default;
}
.fm-edge:hover {
  stroke: var(--fm-accent-1);
  stroke-width: 2.5;
  opacity: 1;
}
.fm-edge-solid {
  stroke-dasharray: none;
}
.fm-edge-dashed {
  stroke-dasharray: 6 6;
}
.fm-edge-thick {
  stroke-width: 2.5;
}
.fm-edge-thick:hover {
  stroke-width: 3.5;
}
.fm-edge-back {
  stroke: var(--fm-edge-muted);
  opacity: 0.8;
  stroke-dasharray: 4 4;
}
.fm-edge-labeled > rect {
  fill: var(--fm-edge-label-bg);
  stroke: var(--fm-edge-label-border);
  stroke-width: 0.75;
  rx: 6px;
  ry: 6px;
}
/* Add a backdrop filter for modern glassmorphism effect on the rect */
@supports (backdrop-filter: blur(4px)) {
  .fm-edge-labeled > rect {
    fill: color-mix(in srgb, var(--fm-edge-label-bg) 85%, transparent);
    backdrop-filter: blur(8px);
  }
}
.edge-label {
  fill: var(--fm-edge-label-text);
  font-weight: 600;
  font-size: 0.88em;
  letter-spacing: -0.01em;
  text-rendering: optimizeLegibility;
}
marker#arrow-end path,
marker#arrow-filled path,
marker#arrow-circle path,
marker#arrow-diamond path {
  fill: var(--fm-edge-color);
  stroke: none;
  transition: fill 200ms ease;
}
.fm-edge:hover ~ marker#arrow-end path,
.fm-edge:hover ~ marker#arrow-filled path,
.fm-edge:hover ~ marker#arrow-circle path,
.fm-edge:hover ~ marker#arrow-diamond path {
  fill: var(--fm-accent-1);
}
marker#arrow-open path {
  stroke: var(--fm-edge-muted);
  fill: none;
  stroke-width: 1.8;
  transition: stroke 200ms ease;
}
marker#arrow-cross path {
  stroke: var(--fm-edge-color);
  fill: none;
  stroke-width: 1.8;
  transition: stroke 200ms ease;
}
.fm-cluster {
  fill: var(--fm-cluster-fill);
  stroke: var(--fm-cluster-stroke);
  stroke-width: 1;
  stroke-dasharray: 5 3;
  rx: 12;
  ry: 12;
}
.fm-cluster-label {
  fill: var(--fm-cluster-label-color);
  font-weight: 700;
  font-size: 0.85em;
  letter-spacing: 0.01em;
}
.fm-cluster-c4 {
  fill: var(--fm-cluster-c4-fill);
  stroke: var(--fm-cluster-c4-stroke);
  stroke-dasharray: none;
}
.fm-cluster-swimlane {
  fill: var(--fm-cluster-swimlane-fill);
  stroke: var(--fm-cluster-swimlane-stroke);
  stroke-dasharray: none;
}
.fm-label {
  fill: var(--fm-text-color);
}
@media (prefers-reduced-motion: reduce) {
  .fm-node rect,
  .fm-node path,
  .fm-node circle,
  .fm-node ellipse,
  .fm-node polygon,
  .fm-edge {
    transition: none;
    transform: none;
  }
}
.fm-node:focus-visible {
  outline: 2px solid var(--fm-accent-1);
  outline-offset: 3px;
}

/* High contrast mode support */
@media (prefers-contrast: more) {
  :root {
    --fm-bg: #ffffff !important;
    --fm-text-color: #000000 !important;
    --fm-node-fill: #ffffff !important;
    --fm-node-stroke: #000000 !important;
    --fm-edge-color: #000000 !important;
  }
  .fm-node { stroke-width: 2px !important; }
  .fm-edge { stroke-width: 2px !important; }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  .fm-edge, .fm-node {
    animation: none !important;
    transition: none !important;
  }
}

/* Focus indicators for keyboard navigation */
.fm-node:focus, .fm-edge:focus {
  outline: 3px solid #0066cc;
  outline-offset: 2px;
}

.fm-node:focus-visible, .fm-edge:focus-visible {
  outline: 3px solid #0066cc;
  outline-offset: 2px;
}

/* Screen reader only content */
.fm-sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
@media print {
  .fm-node text, .fm-edge-labeled text, .fm-cluster-label {
    font-size: 8.0px !important;
    fill: #111 !important;
  }
  .fm-node path, .fm-node rect, .fm-node circle, .fm-edge {
    stroke: #111 !important;
  }
  .fm-cluster {
    fill: #fff !important;
    stroke: #666 !important;
  }
}</style><defs><marker id="arrow-end" markerWidth="8" markerHeight="7" refX="8" refY="3.50" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L8 3.50 L0 7 L2 3.50 Z" fill="#94a3b8"/></marker><marker id="arrow-filled" markerWidth="9" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 L2.50 4 Z" fill="#94a3b8"/></marker><marker id="arrow-open" markerWidth="8" markerHeight="7" refX="7" refY="3.50" orient="auto" markerUnits="strokeWidth"><path d="M0 0.50 L7 3.50 L0 6.50" fill="none" stroke="#94a3b8" stroke-width="1.20"/></marker><marker id="arrow-half-top" markerWidth="12" markerHeight="12" refX="7.90" refY="7.25" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 0 L10 8 L0 8 Z" fill="#94a3b8"/></marker><marker id="arrow-half-bottom" markerWidth="12" markerHeight="12" refX="7.90" refY="0.75" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 0 L10 0 L0 8 Z" fill="#94a3b8"/></marker><marker id="arrow-stick-top" markerWidth="12" markerHeight="12" refX="7.50" refY="7" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 0 L7 7" fill="none" stroke="#94a3b8" stroke-width="1.50"/></marker><marker id="arrow-stick-bottom" markerWidth="12" markerHeight="12" refX="7.50" refY="0" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 7 L7 0" fill="none" stroke="#94a3b8" stroke-width="1.50"/></marker><marker id="arrow-start" markerWidth="8" markerHeight="7" refX="8" refY="3.50" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 0 L8 3.50 L0 7 L2 3.50 Z" fill="#94a3b8"/></marker><marker id="arrow-start-filled" markerWidth="9" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0 0 L9 4 L0 8 L2.50 4 Z" fill="#94a3b8"/></marker><marker id="arrow-circle" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M6 3 A3 3 0 0 1 0 3 A3 3 0 0 1 6 3 Z" fill="#94a3b8"/></marker><marker id="arrow-cross" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0 L6 6 M6 0 L0 6" fill="none" stroke="#94a3b8" stroke-width="1.20"/></marker><marker id="arrow-diamond" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M4 0 L8 4 L4 8 L0 4 Z" fill="#94a3b8"/></marker><filter id="drop-shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter></defs><text x="285.69" y="57" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#1a1a2e" class="fm-pie-title">Fruit Share</text><path d="M 285.6889 285.62927 L 285.6889 113.000015 A 172.62926 172.62926 0 0 1 387.15784 425.28928 Z" fill="#6366f1" stroke="#fafbfc" stroke-width="2" class="fm-pie-slice"/><text x="472.69" y="224.87" text-anchor="start" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12.75" fill="#1a1a2e" class="fm-pie-label">Apples</text><path d="M 285.6889 285.62927 L 387.15784 425.28928 A 172.62926 172.62926 0 0 1 121.50871 338.9746 Z" fill="#3b82f6" stroke="#fafbfc" stroke-width="2" class="fm-pie-slice"/><text x="224.93" y="472.63" text-anchor="end" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12.75" fill="#1a1a2e" class="fm-pie-label">Bananas</text><path d="M 285.6889 285.62927 L 121.50871 338.9746 A 172.62926 172.62926 0 0 1 285.689 113.000015 Z" fill="#06b6d4" stroke="#fafbfc" stroke-width="2" class="fm-pie-slice"/><text x="126.61" y="170.05" text-anchor="end" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12.75" fill="#1a1a2e" class="fm-pie-label">Berries</text><g class="fm-pie-legend"><rect x="555.38" y="89" width="136" height="116" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.20" class="fm-pie-legend-box"/><text x="569.38" y="107" text-anchor="start" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12.30" font-weight="600" fill="#1a1a2e" class="fm-pie-legend-title">Legend</text><rect x="569.38" y="114" width="12" height="12" rx="2" fill="#6366f1" stroke="#fafbfc" stroke-width="1" class="fm-pie-legend-swatch"/><text x="589.38" y="123" text-anchor="start" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a2e" class="fm-pie-legend-entry">Apples</text><rect x="569.38" y="138" width="12" height="12" rx="2" fill="#3b82f6" stroke="#fafbfc" stroke-width="1" class="fm-pie-legend-swatch"/><text x="589.38" y="147" text-anchor="start" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a2e" class="fm-pie-legend-entry">Bananas</text><rect x="569.38" y="162" width="12" height="12" rx="2" fill="#06b6d4" stroke="#fafbfc" stroke-width="1" class="fm-pie-legend-swatch"/><text x="589.38" y="171" text-anchor="start" dominant-baseline="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a2e" class="fm-pie-legend-entry">Berries</text></g></svg>
