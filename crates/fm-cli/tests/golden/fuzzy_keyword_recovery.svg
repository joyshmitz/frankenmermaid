 structure points to Render output</title></g><g class="fm-edge" data-fm-edge-id="4" role="graphics-symbol" tabindex="0"><path d="M420.66 531.50 C420.66 546.50,450.70 576.50,420.66 591.50 C390.63 606.50,330.56 576.50,300.52 591.50 C270.49 606.50,300.52 636.50,300.52 651.50" fill="none" stroke="#94a3b8" stroke-width="1.80" class="fm-edge fm-edge-solid" data-fm-edge-id="4" marker-end="url(#arrow-end)"/><title>Emit warning points to Render output</title></g><g class="fm-node fm-node-accent-4 fm-node-shape-rect" data-id="flwchart_LR" data-fm-node-id="flwchart_LR" role="graphics-symbol" aria-label="flwchart LR" tabindex="0"><rect x="92" y="838" width="145.43" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="164.71" y="876.25" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">flwchart LR</text><title>Node: flwchart LR, rectangle</title></g><g class="fm-node fm-node-accent-6 fm-node-shape-rect" data-id="Intake" data-fm-node-id="Intake" role="graphics-symbol" aria-label="Receive signal" tabindex="0"><rect x="217.91" y="92" width="168.53" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="302.17" y="130.25" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">Receive signal</text><title>Node: Receive signal, rectangle</title></g><g class="fm-node fm-node-accent-5 fm-node-shape-diamond" data-id="Parse" data-fm-node-id="Parse" role="graphics-symbol" aria-label="Infer intent?" tabindex="0"><path d="M294.75 278.50 L371.59 311.75 L294.75 345 L217.91 311.75 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" filter="url(#drop-shadow)"/><text x="294.75" y="316.75" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">Infer intent?</text><title>Node: Infer intent?, diamond</title></g><g class="fm-node fm-node-accent-3 fm-node-shape-rect" data-id="Salvage" data-fm-node-id="Salvage" role="graphics-symbol" aria-label="Salvage structure" tabindex="0"><rect x="92" y="465" width="189.97" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="186.99" y="503.25" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">Salvage structure</text><title>Node: Salvage structure, rectangle</title></g><g class="fm-node fm-node-accent-2 fm-node-shape-rect" data-id="Warn" data-fm-node-id="Warn" role="graphics-symbol" aria-label="Emit warning" tabindex="0"><rect x="343.82" y="465" width="153.68" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="420.66" y="503.25" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">Emit warning</text><title>Node: Emit warning, rectangle</title></g><g class="fm-node fm-node-accent-5 fm-node-shape-rect" data-id="Output" data-fm-node-id="Output" role="graphics-symbol" aria-label="Render output" tabindex="0"><rect x="217.91" y="651.50" width="165.22" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="300.52" y="689.75" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#1a1a2e">Render output</text><title>Node: Render output, rectangle</title></g></svg>
