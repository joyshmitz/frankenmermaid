p-shadow)"/><text x="156.88" y="291.95" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.76" font-weight="600" fill="#cbd5e1" class="fm-c4-type-label">&lt;&lt;System>></text><text x="156.88" y="311.62" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="13.80" font-weight="600" fill="#1a1a2e" class="fm-c4-name">Web App</text><text x="156.88" y="330.25" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="9.94" fill="#1a1a2e" class="fm-c4-description">Serves content</text><title>Node: Web App, rectangle</title></g><g class="fm-node fm-node-accent-8 fm-node-shape-rect fm-node-user-c4 fm-node-user-c4-system fm-node-user-c4-external fm-node-border-dashed" data-id="email" data-fm-node-id="email" role="graphics-symbol" aria-label="Email System" tabindex="0"><rect x="92" y="465" width="156.98" height="66.50" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.60" rx="5.50" filter="url(#drop-shadow)"/><text x="170.49" y="478.45" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="10.76" font-weight="600" fill="#cbd5e1" class="fm-c4-type-label">&lt;&lt;System>></text><text x="170.49" y="498.12" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="13.80" font-weight="600" fill="#1a1a2e" class="fm-c4-name">Email System</text><text x="170.49" y="516.75" text-anchor="middle" font-family="&#39;Inter&#39;, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, Helvetica, Arial, sans-serif" font-size="9.94" fill="#1a1a2e" class="fm-c4-description">Sends emails</text><title>Node: Email System, rectangle</title></g></svg>
