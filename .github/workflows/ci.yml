name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate-config:
    name: Quality Gate Config
    runs-on: ubuntu-latest
    outputs:
      proptest_cases: ${{ steps.parse.outputs.proptest_cases }}
      benchmark_commands_json: ${{ steps.parse.outputs.benchmark_commands_json }}
      benchmark_warn_pct: ${{ steps.parse.outputs.benchmark_warn_pct }}
      benchmark_fail_pct: ${{ steps.parse.outputs.benchmark_fail_pct }}
      benchmark_sample_count: ${{ steps.parse.outputs.benchmark_sample_count }}
      benchmark_baseline_path: ${{ steps.parse.outputs.benchmark_baseline_path }}
      benchmark_slo_path: ${{ steps.parse.outputs.benchmark_slo_path }}
      invariant_command: ${{ steps.parse.outputs.invariant_command }}
      determinism_command: ${{ steps.parse.outputs.determinism_command }}
      degradation_command: ${{ steps.parse.outputs.degradation_command }}
      golden_enabled: ${{ steps.parse.outputs.golden_enabled }}
      property_enabled: ${{ steps.parse.outputs.property_enabled }}
      invariant_enabled: ${{ steps.parse.outputs.invariant_enabled }}
      performance_enabled: ${{ steps.parse.outputs.performance_enabled }}
      determinism_enabled: ${{ steps.parse.outputs.determinism_enabled }}
      evidence_enabled: ${{ steps.parse.outputs.evidence_enabled }}
      decision_enabled: ${{ steps.parse.outputs.decision_enabled }}
      degradation_enabled: ${{ steps.parse.outputs.degradation_enabled }}
      override_policy_enabled: ${{ steps.parse.outputs.override_policy_enabled }}
      release_signoff_enabled: ${{ steps.parse.outputs.release_signoff_enabled }}
      release_signoff_spec_path: ${{ steps.parse.outputs.release_signoff_spec_path }}
      demo_evidence_enabled: ${{ steps.parse.outputs.demo_evidence_enabled }}
      demo_static_repeat: ${{ steps.parse.outputs.demo_static_repeat }}
      demo_react_repeat: ${{ steps.parse.outputs.demo_react_repeat }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse quality-gates.toml
        id: parse
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import json
          import tomllib
          from pathlib import Path

          config = tomllib.loads(Path(".ci/quality-gates.toml").read_text())
          outputs = {
              "proptest_cases": str(config["property_test"]["cases"]),
              "benchmark_commands_json": json.dumps(config["performance_regression"]["benchmark_commands"]),
              "benchmark_warn_pct": str(config["performance_regression"]["warn_threshold_pct"]),
              "benchmark_fail_pct": str(config["performance_regression"]["fail_threshold_pct"]),
              "benchmark_sample_count": str(config["performance_regression"]["sample_count"]),
              "benchmark_baseline_path": config["performance_regression"]["baseline_path"],
              "benchmark_slo_path": config["performance_regression"]["slo_path"],
              "invariant_command": config["invariant_proof"]["command"],
              "determinism_command": config["determinism"]["command"],
              "degradation_command": config["degradation"]["command"],
              "golden_enabled": str(config["golden_checksum"]["enabled"]).lower(),
              "property_enabled": str(config["property_test"]["enabled"]).lower(),
              "invariant_enabled": str(config["invariant_proof"]["enabled"]).lower(),
              "performance_enabled": str(config["performance_regression"]["enabled"]).lower(),
              "determinism_enabled": str(config["determinism"]["enabled"]).lower(),
              "evidence_enabled": str(config["evidence_ledger"]["enabled"]).lower(),
              "decision_enabled": str(config["decision_contract"]["enabled"]).lower(),
              "degradation_enabled": str(config["degradation"]["enabled"]).lower(),
              "override_policy_enabled": str(config["release_gate_overrides"]["enabled"]).lower(),
              "release_signoff_enabled": str(config["release_signoff"]["enabled"]).lower(),
              "release_signoff_spec_path": config["release_signoff"]["spec_path"],
              "demo_evidence_enabled": str(config["demo_evidence"]["enabled"]).lower(),
              "demo_static_repeat": str(config["demo_evidence"]["static_repeat"]),
              "demo_react_repeat": str(config["demo_evidence"]["react_repeat"]),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  print(f"{key}={value}", file=fh)
          PY

  core-check:
    name: Core Check (${{ matrix.fnx_mode }})
    needs: quality-gate-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fnx_mode: [off, on]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy (fnx off)
        if: matrix.fnx_mode == 'off'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (fnx on)
        if: matrix.fnx_mode == 'on'
        run: cargo clippy --workspace --all-targets --features fnx-integration -- -D warnings

      - name: Test (fnx off)
        if: matrix.fnx_mode == 'off'
        run: cargo test --workspace --all-targets

      - name: Test (fnx on)
        if: matrix.fnx_mode == 'on'
        run: cargo test --workspace --all-targets --features fnx-integration

  installer-canary:
    name: Installer Canary
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bash \
            build-essential \
            ca-certificates \
            curl \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Run installer canary against current checkout
        shell: bash
        env:
          FM_INSTALL_GIT_URL: file://${{ github.workspace }}
          FM_INSTALL_GIT_REV: ${{ github.sha }}
          FM_INSTALL_ROOT: /tmp/fm-install-root
        run: |
          set -euo pipefail
          bash ./install.sh
          export PATH="/tmp/fm-install-root/bin:$PATH"
          printf 'flowchart LR\nA-->B\n' | fm-cli detect - | tee /tmp/fm-detect.txt
          grep -qi 'flowchart' /tmp/fm-detect.txt
          printf 'flowchart LR\nA-->B\n' | fm-cli render - --format svg > /tmp/fm.svg
          grep -q '<svg' /tmp/fm.svg
          fm-cli capabilities > /tmp/fm-capabilities.json
          test -s /tmp/fm-capabilities.json
          if printf 'flowchrt LR\nA-->B\n' | fm-cli validate - --fail-on warning; then
            echo "expected validation warning gate to fail for typo input" >&2
            exit 1
          fi

  golden-checksum-guard:
    name: Golden Checksum Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.golden_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: SVG golden guard
        run: cargo test -p fm-cli --test golden_svg_test -- --nocapture

      - name: Layout golden guard
        run: cargo test -p fm-cli --test golden_layout_test -- --nocapture

  property-test-guard:
    name: Property Test Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.property_enabled == 'true'
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: ${{ needs.quality-gate-config.outputs.proptest_cases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run property-heavy workspace tests
        run: cargo test --workspace --all-targets -- --nocapture

  invariant-proof-guard:
    name: Invariant Proof Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.invariant_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run invariant proof harness
        shell: bash
        run: |
          mkdir -p artifacts/evidence/slo
          ${{ needs.quality-gate-config.outputs.invariant_command }} \
            | tee artifacts/evidence/slo/invariant-proof.log

      - name: Upload invariant proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: invariant-proof-log
          path: artifacts/evidence/slo/invariant-proof.log
          retention-days: 90

  determinism-guard:
    name: Determinism Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.determinism_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run determinism guard
        run: ${{ needs.quality-gate-config.outputs.determinism_command }}

      - name: Run pipeline determinism smoke
        run: cargo test -p fm-cli --test integration_test e2e_pipeline_determinism_all_types -- --nocapture

  cross-platform-determinism-native:
    name: Cross-Platform Determinism (Native ${{ matrix.label }})
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.determinism_enabled == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            runs_on: ubuntu-latest
          - label: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Emit determinism manifest
        run: cargo run -p fm-cli -- determinism-manifest > determinism-manifest-${{ matrix.label }}.json

      - name: Upload determinism manifest
        uses: actions/upload-artifact@v4
        with:
          name: determinism-manifest-${{ matrix.label }}
          path: determinism-manifest-${{ matrix.label }}.json

  cross-platform-determinism-wasm:
    name: Cross-Platform Determinism (WASI)
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.determinism_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Build fm-cli for wasm32-wasip1
        run: cargo build -p fm-cli --target wasm32-wasip1

      - name: Emit WASI determinism manifest
        run: wasmtime run target/wasm32-wasip1/debug/fm-cli.wasm determinism-manifest > determinism-manifest-wasm32-wasip1.json

      - name: Upload WASI determinism manifest
        uses: actions/upload-artifact@v4
        with:
          name: determinism-manifest-wasm32-wasip1
          path: determinism-manifest-wasm32-wasip1.json

  cross-platform-determinism-compare:
    name: Cross-Platform Determinism Compare
    needs:
      - quality-gate-config
      - cross-platform-determinism-native
      - cross-platform-determinism-wasm
    if: needs.quality-gate-config.outputs.determinism_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 manifest
        uses: actions/download-artifact@v4
        with:
          name: determinism-manifest-x86_64
          path: artifacts/x86_64

      - name: Download arm64 manifest
        uses: actions/download-artifact@v4
        with:
          name: determinism-manifest-arm64
          path: artifacts/arm64

      - name: Download wasm manifest
        uses: actions/download-artifact@v4
        with:
          name: determinism-manifest-wasm32-wasip1
          path: artifacts/wasm32-wasip1

      - name: Compare cross-platform manifests
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          base = json.loads(Path("artifacts/x86_64/determinism-manifest-x86_64.json").read_text())
          arm = json.loads(Path("artifacts/arm64/determinism-manifest-arm64.json").read_text())
          wasm = json.loads(Path("artifacts/wasm32-wasip1/determinism-manifest-wasm32-wasip1.json").read_text())

          def comparable(manifest):
              return {
                  "version": manifest["version"],
                  "case_count": manifest["case_count"],
                  "corpus_sha256": manifest["corpus_sha256"],
                  "cases": manifest["cases"],
              }

          base_cmp = comparable(base)
          for label, candidate in [("arm64", arm), ("wasm32-wasip1", wasm)]:
              candidate_cmp = comparable(candidate)
              if candidate_cmp != base_cmp:
                  raise SystemExit(
                      f"determinism manifest mismatch for {label}\n"
                      f"base={json.dumps(base_cmp, indent=2)}\n"
                      f"candidate={json.dumps(candidate_cmp, indent=2)}"
                  )
          PY

  performance-regression-guard:
    name: Performance Regression Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.performance_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Collect repeated benchmark samples
        shell: bash
        run: |
          export FM_BENCHMARK_COMMANDS_JSON='${{ needs.quality-gate-config.outputs.benchmark_commands_json }}'
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          out_dir = pathlib.Path("artifacts/evidence/perf")
          out_dir.mkdir(parents=True, exist_ok=True)
          log_path = out_dir / "layout-benchmark.log"
          commands = json.loads(os.environ["FM_BENCHMARK_COMMANDS_JSON"])
          sample_count = int("${{ needs.quality-gate-config.outputs.benchmark_sample_count }}")

          with log_path.open("w", encoding="utf-8") as fh:
              for run in range(1, sample_count + 1):
                  header = f"# benchmark_run={run}\n"
                  print(header, end="")
                  fh.write(header)
                  fh.flush()
                  for command in commands:
                      proc = subprocess.run(
                          command,
                          shell=True,
                          text=True,
                          capture_output=True,
                          check=False,
                      )
                      if proc.stdout:
                          print(proc.stdout, end="")
                          fh.write(proc.stdout)
                      if proc.stderr:
                          print(proc.stderr, end="")
                          fh.write(proc.stderr)
                      fh.flush()
                      if proc.returncode != 0:
                          raise SystemExit(
                              f"benchmark command failed ({proc.returncode}): {command}"
                          )
          PY

      - name: Summarize statistical benchmark evidence
        shell: bash
        run: |
          cargo run -p fm-cli --bin evidence -- --root . perf-report \
            --input artifacts/evidence/perf/layout-benchmark.log \
            --out-dir artifacts/evidence/perf \
            --baseline "${{ needs.quality-gate-config.outputs.benchmark_baseline_path }}" \
            --slo-policy "${{ needs.quality-gate-config.outputs.benchmark_slo_path }}" \
            --warn-threshold-pct "${{ needs.quality-gate-config.outputs.benchmark_warn_pct }}" \
            --fail-threshold-pct "${{ needs.quality-gate-config.outputs.benchmark_fail_pct }}"

      - name: Upload performance evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmark-evidence
          path: artifacts/evidence/perf
          retention-days: 90

  degradation-guard:
    name: Degradation Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.degradation_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run degradation SLO harness
        shell: bash
        run: |
          mkdir -p artifacts/evidence/slo
          ${{ needs.quality-gate-config.outputs.degradation_command }} \
            | tee artifacts/evidence/slo/degradation.log

      - name: Upload degradation artifact
        uses: actions/upload-artifact@v4
        with:
          name: degradation-slo-log
          path: artifacts/evidence/slo/degradation.log
          retention-days: 90

  evidence-ledger-guard:
    name: Evidence Ledger Guard
    needs:
      - quality-gate-config
      - core-check
      - golden-checksum-guard
      - property-test-guard
      - invariant-proof-guard
      - determinism-guard
      - cross-platform-determinism-native
      - cross-platform-determinism-wasm
      - cross-platform-determinism-compare
      - performance-regression-guard
      - degradation-guard
      - decision-contract-guard
      - demo-evidence-guard
      - wasm-build
      - coverage
    if: always() && needs.quality-gate-config.outputs.evidence_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Capture SVG golden evidence log
        shell: bash
        run: |
          mkdir -p artifacts/evidence/logs artifacts/evidence/proofs
          cargo test -p fm-cli --test golden_svg_test svg_golden_snapshots_are_stable -- --nocapture \
            | tee artifacts/evidence/logs/svg-golden.log

      - name: Capture layout golden evidence log
        shell: bash
        run: |
          cargo test -p fm-cli --test golden_layout_test -- --nocapture \
            | tee artifacts/evidence/logs/layout-golden.log

      - name: Capture determinism evidence log
        shell: bash
        run: |
          ${{ needs.quality-gate-config.outputs.determinism_command }} \
            | tee artifacts/evidence/logs/determinism.log

      - name: Emit x86_64 determinism manifest
        shell: bash
        run: |
          cargo run -p fm-cli -- determinism-manifest \
            > artifacts/evidence/proofs/determinism-manifest-x86_64.json

      - name: Download demo evidence artifacts
        if: needs.quality-gate-config.outputs.demo_evidence_enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: demo-evidence-replays
          path: artifacts/evidence/demo

      - name: Refresh ledger report with bead coverage
        shell: bash
        run: |
          cargo run -p fm-cli --bin evidence -- --root . report --check-beads --fail-on-missing-beads

      - name: Generate release signoff checklist and validation matrix
        if: needs.quality-gate-config.outputs.release_signoff_enabled == 'true'
        shell: bash
        run: |
          mkdir -p artifacts/evidence/signoff artifacts/evidence/policies
          cargo run -p fm-cli --bin evidence -- --root . verify-overrides \
            > artifacts/evidence/policies/release-gate-override-summary.json
          cargo run -p fm-cli --bin evidence -- --root . release-signoff \
            --spec-path "${{ needs.quality-gate-config.outputs.release_signoff_spec_path }}" \
            --override-summary artifacts/evidence/policies/release-gate-override-summary.json \
            --demo-evidence-summary artifacts/evidence/demo/demo-evidence-summary.json \
            --gate-result "core-check=${{ needs.core-check.result }}" \
            --gate-result "golden-checksum-guard=${{ needs.golden-checksum-guard.result }}" \
            --gate-result "property-test-guard=${{ needs.property-test-guard.result }}" \
            --gate-result "invariant-proof-guard=${{ needs.invariant-proof-guard.result }}" \
            --gate-result "determinism-guard=${{ needs.determinism-guard.result }}" \
            --gate-result "cross-platform-determinism-native=${{ needs.cross-platform-determinism-native.result }}" \
            --gate-result "cross-platform-determinism-wasm=${{ needs.cross-platform-determinism-wasm.result }}" \
            --gate-result "cross-platform-determinism-compare=${{ needs.cross-platform-determinism-compare.result }}" \
            --gate-result "performance-regression-guard=${{ needs.performance-regression-guard.result }}" \
            --gate-result "degradation-guard=${{ needs.degradation-guard.result }}" \
            --gate-result "decision-contract-guard=${{ needs.decision-contract-guard.result }}" \
            --gate-result "demo-evidence-guard=${{ needs.demo-evidence-guard.result }}" \
            --gate-result "wasm-build=${{ needs.wasm-build.result }}" \
            --gate-result "coverage=${{ needs.coverage.result }}" \
            > artifacts/evidence/signoff/summary.stdout.json

      - name: Build release evidence bundle
        shell: bash
        run: |
          bundle_dir="$(
            cargo run -p fm-cli --bin evidence -- --root . bundle \
              --out-dir artifacts/release-evidence \
              --release-ref "${GITHUB_REF_NAME:-${GITHUB_SHA}}" \
              --retention-days 90 \
              --artifact artifacts/evidence/logs/svg-golden.log \
              --artifact artifacts/evidence/logs/layout-golden.log \
              --artifact artifacts/evidence/logs/determinism.log \
              --artifact artifacts/evidence/proofs/determinism-manifest-x86_64.json \
              --artifact artifacts/evidence/policies/release-gate-override-summary.json \
              --artifact artifacts/evidence/signoff/summary.json \
              --artifact artifacts/evidence/signoff/README.md \
              --artifact artifacts/evidence/demo/demo-evidence-summary.json \
              --artifact artifacts/evidence/demo/deploy-smoke/deploy-smoke-summary.json \
              --artifact artifacts/evidence/demo/deploy-smoke/deploy-smoke-parity.json \
              --artifact artifacts/evidence/demo/static-replay/replay_manifest.json \
              --artifact artifacts/evidence/demo/static-replay/replay_suite.sh \
              --artifact artifacts/evidence/demo/react-replay/replay_manifest.json \
              --artifact artifacts/evidence/demo/react-replay/replay_suite.sh
          )"
          echo "bundle_dir=$bundle_dir" >> "$GITHUB_ENV"
          echo "bundle_name=$(basename "$bundle_dir")" >> "$GITHUB_ENV"

      - name: Verify release evidence bundle integrity
        shell: bash
        run: |
          cargo run -p fm-cli --bin evidence -- --root . verify-bundle \
            --manifest "${bundle_dir}/manifest.json" \
            --require-kind ledger-report \
            --require-kind ledger-entry \
            --require-kind decision-contract \
            --require-kind ci-artifact

      - name: Publish release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.bundle_name }}
          path: ${{ env.bundle_dir }}
          retention-days: 90

      - name: Summarize release evidence bundle
        shell: bash
        run: |
          {
            echo "### Evidence Bundle"
            echo ""
            echo "- Artifact path: \`${bundle_dir}\`"
            echo "- Retention: \`90 days\`"
            echo "- Manifest: \`${bundle_dir}/manifest.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

  decision-contract-guard:
    name: Decision Contract Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.decision_enabled == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify decision contracts exist
        shell: bash
        run: |
          find evidence/contracts -maxdepth 1 -name '*.md' | grep -q .

  release-gate-override-guard:
    name: Release Gate Override Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.override_policy_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate release-gate override ledger
        shell: bash
        run: |
          mkdir -p artifacts/evidence/policies
          cargo run -p fm-cli --bin evidence -- --root . verify-overrides \
            > artifacts/evidence/policies/release-gate-override-summary.json

      - name: Upload override summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-override-summary
          path: artifacts/evidence/policies/release-gate-override-summary.json
          retention-days: 90

  demo-evidence-guard:
    name: Demo Evidence Guard
    needs: quality-gate-config
    if: needs.quality-gate-config.outputs.demo_evidence_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Chromium
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium

      - name: Run static and React demo replay suites
        shell: bash
        run: |
          mkdir -p artifacts/evidence/demo
          CHROMIUM_BIN="$(command -v chromium || command -v chromium-browser || command -v google-chrome)"
          python3 scripts/run_static_web_e2e.py \
            --bead-id ci-demo-static \
            --repo-root . \
            --output-root artifacts/evidence/demo/static \
            --route-prefix /web \
            --surface web \
            --host-kind static-web \
            --scenario-prefix static-web \
            --chromium "$CHROMIUM_BIN" \
            --repeat "${{ needs.quality-gate-config.outputs.demo_static_repeat }}" \
            --replay-bundle-dir artifacts/evidence/demo/static-replay
          python3 scripts/run_static_web_e2e.py \
            --bead-id ci-demo-react \
            --repo-root . \
            --output-root artifacts/evidence/demo/react \
            --route-prefix /web_react \
            --surface web_react \
            --host-kind react-web \
            --scenario-prefix react-web \
            --chromium "$CHROMIUM_BIN" \
            --repeat "${{ needs.quality-gate-config.outputs.demo_react_repeat }}" \
            --replay-bundle-dir artifacts/evidence/demo/react-replay

      - name: Run staged Cloudflare deploy smoke gate
        shell: bash
        run: |
          CHROMIUM_BIN="$(command -v chromium || command -v chromium-browser || command -v google-chrome)"
          python3 scripts/cloudflare_pages_ops.py smoke-check \
            --repo-root . \
            --stage-dir artifacts/evidence/demo/deploy-smoke-stage \
            --output-root artifacts/evidence/demo/deploy-smoke \
            --chromium "$CHROMIUM_BIN" \
            --scenario-id static-web-compare-export \
            --scenario-id static-web-diagnostics-recovery \
            --profile-id desktop-default \
            --repeat 2 \
            --report-out artifacts/evidence/demo/deploy-smoke/deploy-smoke-summary.json

      - name: Validate demo evidence summaries and replay bundles
        shell: bash
        run: |
          static_summary="$(find artifacts/evidence/demo/static -maxdepth 1 -name '*__determinism__summary.json' | sort | tail -n 1)"
          react_summary="$(find artifacts/evidence/demo/react -maxdepth 1 -name '*__determinism__summary.json' | sort | tail -n 1)"
          python3 scripts/showcase_harness.py validate-e2e-summary \
            --summary "$static_summary" \
            --repo-root . \
            --require-replay-bundle
          python3 scripts/showcase_harness.py validate-e2e-summary \
            --summary "$react_summary" \
            --repo-root . \
            --require-replay-bundle
          python3 - <<'PY'
          import json
          from pathlib import Path

          static_summary = Path(sorted(Path("artifacts/evidence/demo/static").glob("*__determinism__summary.json"))[-1])
          react_summary = Path(sorted(Path("artifacts/evidence/demo/react").glob("*__determinism__summary.json"))[-1])
          static_payload = json.loads(static_summary.read_text())
          react_payload = json.loads(react_summary.read_text())
          deploy_smoke_summary = Path("artifacts/evidence/demo/deploy-smoke/deploy-smoke-summary.json")
          deploy_smoke_payload = json.loads(deploy_smoke_summary.read_text())

          def stable_counts(payload):
              total = len(payload["determinism"])
              stable_output = sum(1 for item in payload["determinism"] if item["stable_output_hash"])
              stable_normalized = sum(1 for item in payload["determinism"] if item["stable_normalized_log"])
              return {
                  "total_groups": total,
                  "stable_output_groups": stable_output,
                  "stable_normalized_groups": stable_normalized,
              }

          combined = {
              "schema_version": 1,
              "static_summary": str(static_summary),
              "react_summary": str(react_summary),
              "static": stable_counts(static_payload),
              "react": stable_counts(react_payload),
              "replay_bundles": {
                  "static_manifest": static_payload["replay_bundle"]["manifest_path"],
                  "react_manifest": react_payload["replay_bundle"]["manifest_path"],
              },
              "deploy_smoke": {
                  "summary_path": str(deploy_smoke_summary),
                  "ok": deploy_smoke_payload["ok"],
                  "route_integrity_ok": deploy_smoke_payload["route_integrity"]["ok"],
                  "parity_ok": deploy_smoke_payload["parity"]["ok"],
                  "check_count": len(deploy_smoke_payload["checks"]),
                  "passed_checks": sum(1 for item in deploy_smoke_payload["checks"] if item["ok"]),
              },
          }
          out_path = Path("artifacts/evidence/demo/demo-evidence-summary.json")
          out_path.write_text(json.dumps(combined, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(combined, indent=2))
          PY

      - name: Upload demo evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-evidence-replays
          path: artifacts/evidence/demo
          retention-days: 90

  quality-summary:
    name: Quality Summary
    needs:
      - quality-gate-config
      - core-check
      - golden-checksum-guard
      - property-test-guard
      - invariant-proof-guard
      - determinism-guard
      - cross-platform-determinism-native
      - cross-platform-determinism-wasm
      - cross-platform-determinism-compare
      - performance-regression-guard
      - degradation-guard
      - evidence-ledger-guard
      - decision-contract-guard
      - release-gate-override-guard
      - demo-evidence-guard
      - wasm-build
      - coverage
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize gate results
        shell: bash
        run: |
          {
            echo "## Quality Gates"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| core-check | ${{ needs.core-check.result }} |"
            echo "| golden-checksum-guard | ${{ needs.golden-checksum-guard.result }} |"
            echo "| property-test-guard | ${{ needs.property-test-guard.result }} |"
            echo "| invariant-proof-guard | ${{ needs.invariant-proof-guard.result }} |"
            echo "| determinism-guard | ${{ needs.determinism-guard.result }} |"
            echo "| cross-platform-determinism-native | ${{ needs.cross-platform-determinism-native.result }} |"
            echo "| cross-platform-determinism-wasm | ${{ needs.cross-platform-determinism-wasm.result }} |"
            echo "| cross-platform-determinism-compare | ${{ needs.cross-platform-determinism-compare.result }} |"
            echo "| performance-regression-guard | ${{ needs.performance-regression-guard.result }} |"
            echo "| degradation-guard | ${{ needs.degradation-guard.result }} |"
            echo "| evidence-ledger-guard | ${{ needs.evidence-ledger-guard.result }} |"
            echo "| decision-contract-guard | ${{ needs.decision-contract-guard.result }} |"
            echo "| release-gate-override-guard | ${{ needs.release-gate-override-guard.result }} |"
            echo "| demo-evidence-guard | ${{ needs.demo-evidence-guard.result }} |"
            echo "| wasm-build | ${{ needs.wasm-build.result }} |"
            echo "| coverage | ${{ needs.coverage.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate release SLO summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import subprocess

          results = {
              "core-check": "${{ needs.core-check.result }}",
              "golden-checksum-guard": "${{ needs.golden-checksum-guard.result }}",
              "property-test-guard": "${{ needs.property-test-guard.result }}",
              "invariant-proof-guard": "${{ needs.invariant-proof-guard.result }}",
              "determinism-guard": "${{ needs.determinism-guard.result }}",
              "cross-platform-determinism-native": "${{ needs.cross-platform-determinism-native.result }}",
              "cross-platform-determinism-wasm": "${{ needs.cross-platform-determinism-wasm.result }}",
              "cross-platform-determinism-compare": "${{ needs.cross-platform-determinism-compare.result }}",
              "performance-regression-guard": "${{ needs.performance-regression-guard.result }}",
              "degradation-guard": "${{ needs.degradation-guard.result }}",
              "release-gate-override-guard": "${{ needs.release-gate-override-guard.result }}",
              "demo-evidence-guard": "${{ needs.demo-evidence-guard.result }}",
              "wasm-build": "${{ needs.wasm-build.result }}",
              "coverage": "${{ needs.coverage.result }}",
          }
          summary = json.loads(
              subprocess.check_output(
                  [
                      "cargo",
                      "run",
                      "-p",
                      "fm-cli",
                      "--bin",
                      "evidence",
                      "--",
                      "--root",
                      ".",
                      "verify-overrides",
                  ],
                  text=True,
              )
          )
          active_gates = set(summary["active_gates"])
          overridden = []
          failures = []
          passed = []
          for gate, result in results.items():
              if result == "success":
                  passed.append(gate)
                  continue
              if gate in active_gates:
                  overridden.append(gate)
              else:
                  failures.append(gate)

          slo_summary = {
              "policy_id": summary["policy_id"],
              "active_override_gates": sorted(active_gates),
              "passed_gates": passed,
              "overridden_failing_gates": overridden,
              "uncovered_failing_gates": failures,
              "release_blocking_pass": len(failures) == 0,
              "gate_results": results,
              "threshold_notes": [
                  "All blocking quality gates must report success unless a valid active override explicitly scopes the failing gate.",
                  "Invariant proof guard supplies correctness evidence.",
                  "Determinism guards supply repeated-run and cross-platform drift evidence.",
                  "Performance regression guard supplies benchmark budget evidence.",
                  "Degradation guard supplies pressure-tier graceful-degradation evidence.",
              ],
          }
          out_dir = Path("artifacts/evidence/slo")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / "release-slo-summary.json"
          out_path.write_text(json.dumps(slo_summary, indent=2), encoding="utf-8")
          print(json.dumps(slo_summary, indent=2))
          PY

      - name: Upload release SLO summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-slo-summary
          path: artifacts/evidence/slo/release-slo-summary.json
          retention-days: 90

      - name: Enforce blocking gate status
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          summary = json.loads(
              Path("artifacts/evidence/slo/release-slo-summary.json").read_text()
          )
          print("Active override gates:", summary["active_override_gates"])
          if summary["overridden_failing_gates"]:
              print("Overridden failing gates:", summary["overridden_failing_gates"])
          if summary["uncovered_failing_gates"]:
              print(
                  "Blocking gate failures without valid override:",
                  summary["uncovered_failing_gates"],
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install wasm-opt (binaryen)
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build optimized WASM package
        run: ./build-wasm.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Coverage Report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
