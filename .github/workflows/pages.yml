name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          set -euo pipefail
          mkdir -p dist/pkg
          cp frankenmermaid_demo_showcase.html dist/index.html
          cp frankenmermaid_demo_showcase.html dist/frankenmermaid_demo_showcase.html
          cp pkg/frankenmermaid.js dist/pkg/
          cp pkg/frankenmermaid_bg.wasm dist/pkg/
          cp pkg/frankenmermaid.d.ts dist/pkg/
          cp pkg/frankenmermaid_bg.wasm.d.ts dist/pkg/
          cp pkg/package.json dist/pkg/
          cp frankenmermaid_illustration.webp dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
